name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write       # for GitHub Release creation
  id-token: write       # for npm provenance via Sigstore OIDC

jobs:
  release:
    name: Publish to npm + GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install npm >=11.5 in sandbox for OIDC trusted-publishing auth
        run: |
          # The in-place 'npm install -g npm@latest' on Node 22's bundled npm
          # 10.9 races on its own arborist rebuild and breaks irrecoverably
          # (MODULE_NOT_FOUND: promise-retry). Workaround: install npm@latest
          # as a regular dependency into a sandbox directory and prepend its
          # bin to PATH. The system npm is left untouched; we just shadow it.
          SANDBOX="$HOME/.npm-cli-sandbox"
          mkdir -p "$SANDBOX"
          pushd "$SANDBOX" >/dev/null
          echo '{"name":"npm-cli-sandbox","version":"0.0.0","private":true}' > package.json
          npm install --no-save --no-audit --no-fund --silent npm@latest
          popd >/dev/null
          echo "$SANDBOX/node_modules/.bin" >> "$GITHUB_PATH"
          # Smoke-test the sandboxed npm
          "$SANDBOX/node_modules/.bin/npm" --version

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag: ${GITHUB_REF_NAME} → ${TAG_VERSION}"
          echo "Package: ${PKG_VERSION}"
          if [ "${PKG_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::Tag ${TAG_VERSION} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci || npm install

      - name: Smoke tests
        run: npm test

      - name: npm pack dry-run (verify shape)
        run: npm pack --dry-run

      - name: Build release zip
        run: |
          ZIP_NAME="sovereign-${GITHUB_REF_NAME}-release.zip"
          cd release
          zip -r "../${ZIP_NAME}" .
          cd ..
          ls -la "${ZIP_NAME}"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Publish to npm with provenance (OIDC trusted publisher)
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "Sovereign ${GITHUB_REF_NAME}" \
            --notes-file CHANGELOG.md \
            --verify-tag \
            "${ZIP_NAME}"
